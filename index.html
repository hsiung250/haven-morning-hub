<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#10243f">
  <title>高天通訊處早會課程</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="hero" id="home">
    <div class="hero-inner">
      <img class="logo" src="assets/haven-logo.png" alt="HAVEN Logo">
      <div class="eyebrow">HAVEN TEAM</div>
      <h1>高天通訊處早會課程</h1>
      <p>孝順｜感恩｜專一｜熱情｜共好</p>
      <div class="hero-actions">
        <button class="primary" data-scroll="today">查看今日課程</button>
        <button class="secondary" data-scroll="schedule">瀏覽完整課表</button>
      </div>
    </div>
  </header>

  <main>
    <section class="dashboard" id="today">
      <div class="section-heading">
        <span>Today</span>
        <h2>今日早會課程</h2>
      </div>
      <div class="today-grid">
        <article class="card date-card">
          <small>今天日期</small>
          <strong id="todayDate">—</strong>
          <span id="todayWeekday">—</span>
        </article>
        <article class="card">
          <small>今日主持值星</small>
          <strong id="todayHost">—</strong>
          <span>早會值星＆公文宣導</span>
        </article>
        <article class="card">
          <small>今日財經時事</small>
          <strong id="todayFinance">—</strong>
          <span>財經時事分享</span>
        </article>
        <article class="card accent-card">
          <small>當天早會課程</small>
          <strong id="todayCourse">—</strong>
          <span id="todaySpeaker">—</span>
        </article>
      </div>
    </section>

    <section class="content-section">
      <div class="section-heading">
        <span>Notice</span>
        <h2>今日公告</h2>
      </div>
      <div id="announcementList" class="announcement-list"></div>
    </section>

    <section class="content-section" id="schedule">
      <div class="section-heading row-heading">
        <div>
          <span>Schedule</span>
          <h2>早會課表</h2>
        </div>
        <div id="monthTabs" class="month-tabs"></div>
      </div>
      <div class="schedule-toolbar">
        <input id="searchInput" type="search" placeholder="搜尋姓名、課程、講師、日期或關鍵字">
        <button id="clearSearch" class="ghost">清除</button>
      </div>
      <div id="scheduleList" class="schedule-list"></div>
      <div id="emptyState" class="empty-state" hidden>找不到符合的課程資料。</div>
    </section>

    <section class="content-section">
      <div class="section-heading">
        <span>Highlights</span>
        <h2>本月重點</h2>
      </div>
      <div id="highlightList" class="highlight-grid"></div>
    </section>

    <section class="content-section" id="materials">
      <div class="section-heading">
        <span>Materials</span>
        <h2>教材中心</h2>
      </div>
      <div id="materialList" class="material-grid"></div>
    </section>
  </main>

  <nav class="bottom-nav" aria-label="主要導覽">
    <button data-scroll="home"><b>⌂</b><span>首頁</span></button>
    <button data-scroll="today"><b>◷</b><span>今日</span></button>
    <button data-scroll="schedule"><b>▦</b><span>課表</span></button>
    <button id="focusSearch"><b>⌕</b><span>查詢</span></button>
  </nav>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
